  <rect x="34" y="36" width="4" height="6" rx="0.5" fill="url(#tower)"/>
  <rect x="40" y="36" width="4" height="6" rx="0.5" fill="url(#tower)"/>
  <rect x="52" y="26" width="4" height="6" rx="0.5" fill="url(#tower)"/>
  <rect x="58" y="26" width="4" height="6" rx="0.5" fill="url(#tower)"/>
  <rect x="64" y="26" width="4" height="6" rx="0.5" fill="url(#tower)"/>
  <rect x="76" y="36" width="4" height="6" rx="0.5" fill="url(#tower)"/>
  <rect x="82" y="36" width="4" height="6" rx="0.5" fill="url(#tower)"/>
  <rect x="88" y="36" width="4" height="6" rx="0.5" fill="url(#tower)"/>
  <!-- Gate -->
  <path d="M55 75 L55 60 Q60 54 65 60 L65 75 Z" fill="#4f46e5" opacity="0.6"/>
  <!-- Connecting wall -->
  <rect x="42" y="52" width="12" height="8" rx="0.5" fill="url(#tower)" opacity="0.7"/>
  <rect x="66" y="52" width="12" height="8" rx="0.5" fill="url(#tower)" opacity="0.7"/>

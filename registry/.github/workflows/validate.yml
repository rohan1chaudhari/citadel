name: Registry Validation

on:
  pull_request:
    paths:
      - 'registry.json'
  push:
    branches: [main]
    paths:
      - 'registry.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Registry JSON
        run: |
          node -e "
            const fs = require('fs');
            const registry = JSON.parse(fs.readFileSync('registry.json', 'utf8'));
            
            // Check required fields
            if (!registry.version) throw new Error('Missing registry.version');
            if (!registry.apps || !Array.isArray(registry.apps)) throw new Error('Missing or invalid apps array');
            
            // Check for duplicate IDs
            const ids = registry.apps.map(a => a.id);
            const duplicates = ids.filter((id, i) => ids.indexOf(id) !== i);
            if (duplicates.length > 0) throw new Error('Duplicate app IDs: ' + duplicates.join(', '));
            
            console.log('✓ Registry JSON is valid');
            console.log('✓ Found', registry.apps.length, 'apps');
          "

      - name: Validate App Repositories
        run: |
          node -e "
            const fs = require('fs');
            const https = require('https');
            
            const registry = JSON.parse(fs.readFileSync('registry.json', 'utf8'));
            
            async function checkUrl(url) {
              return new Promise((resolve, reject) => {
                https.get(url, { method: 'HEAD', timeout: 10000 }, (res) => {
                  resolve(res.statusCode);
                }).on('error', reject);
              });
            }
            
            async function validateApps() {
              const errors = [];
              
              for (const app of registry.apps) {
                console.log('Checking:', app.id);
                
                // Required fields
                const required = ['id', 'name', 'description', 'repo_url', 'author', 'tags', 'version', 'manifest_version'];
                for (const field of required) {
                  if (!app[field]) {
                    errors.push(\`\${app.id}: Missing required field '\${field}'\`);
                  }
                }
                
                // Check repo_url format
                if (app.repo_url && !app.repo_url.startsWith('https://github.com/')) {
                  errors.push(\`\${app.id}: repo_url must be a GitHub URL\`);
                }
                
                // Try to fetch app.yaml from raw GitHub content
                if (app.repo_url) {
                  const rawUrl = app.repo_url
                    .replace('github.com', 'raw.githubusercontent.com')
                    + '/main/app.yaml';
                  
                  try {
                    const status = await checkUrl(rawUrl);
                    if (status !== 200) {
                      // Try 'master' branch
                      const masterUrl = app.repo_url
                        .replace('github.com', 'raw.githubusercontent.com')
                        + '/master/app.yaml';
                      const masterStatus = await checkUrl(masterUrl);
                      if (masterStatus !== 200) {
                        errors.push(\`\${app.id}: Could not find app.yaml in repo (tried main and master branches)\`);
                      }
                    }
                  } catch (err) {
                    errors.push(\`\${app.id}: Error checking repo: \${err.message}\`);
                  }
                }
                
                // Tags should be an array
                if (app.tags && !Array.isArray(app.tags)) {
                  errors.push(\`\${app.id}: tags must be an array\`);
                }
              }
              
              if (errors.length > 0) {
                console.error('\\nValidation errors:');
                errors.forEach(e => console.error('  ✗', e));
                process.exit(1);
              }
              
              console.log('\\n✓ All apps validated successfully');
            }
            
            validateApps();
          "

name: Validate Registry PR

on:
  pull_request:
    paths:
      - 'registry.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate registry.json
        run: node .github/scripts/validate-registry.js

      - name: Check app repositories
        run: node .github/scripts/check-repos.js

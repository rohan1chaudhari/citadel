name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Verify version matches tag before proceeding
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify package.json version matches tag
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "✓ Version match confirmed: $TAG_VERSION"

  # Smoke test: build passes before creating release
  smoke-test:
    runs-on: ubuntu-latest
    needs: verify-version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install workspace dependencies
        run: |
          cd core && npm ci && cd ..
          cd host && npm ci && cd ..

      - name: Build core package
        run: npm run build --workspace=core

      - name: Build host package
        run: npm run build --workspace=host

      - name: Verify build artifacts
        run: |
          test -d core/dist || (echo "Core dist missing" && exit 1)
          test -d host/.next || (echo "Host .next missing" && exit 1)
          echo "✓ Smoke test passed - builds successful"

  # Build and push Docker image
  build-and-push-image:
    runs-on: ubuntu-latest
    needs: [verify-version, smoke-test]
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # Generate changelog and create release
  create-release:
    runs-on: ubuntu-latest
    needs: [verify-version, smoke-test, build-and-push-image]
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Generate changelog
        id: changelog
        run: |
          # Get the current tag
          CURRENT_TAG=${GITHUB_REF_NAME}
          
          # Get the previous tag (if any)
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 --exclude="$CURRENT_TAG" 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            # First release - include all commits
            COMMIT_RANGE="HEAD"
            echo "First release - including all commits"
          else
            COMMIT_RANGE="${PREVIOUS_TAG}..HEAD"
            echo "Previous tag: $PREVIOUS_TAG"
          fi
          
          echo "Current tag: $CURRENT_TAG"
          echo "Commit range: $COMMIT_RANGE"
          
          # Generate changelog from conventional commits
          CHANGELOG="## What's Changed"
          
          # Features
          FEATURES=$(git log "$COMMIT_RANGE" --pretty=format:"- %s (%h)" --grep="^feat" 2>/dev/null || true)
          if [ -n "$FEATURES" ]; then
            CHANGELOG="$CHANGELOG

### ✨ Features
$FEATURES"
          fi
          
          # Fixes
          FIXES=$(git log "$COMMIT_RANGE" --pretty=format:"- %s (%h)" --grep="^fix" 2>/dev/null || true)
          if [ -n "$FIXES" ]; then
            CHANGELOG="$CHANGELOG

### 🐛 Bug Fixes
$FIXES"
          fi
          
          # Documentation
          DOCS=$(git log "$COMMIT_RANGE" --pretty=format:"- %s (%h)" --grep="^docs" 2>/dev/null || true)
          if [ -n "$DOCS" ]; then
            CHANGELOG="$CHANGELOG

### 📚 Documentation
$DOCS"
          fi
          
          # Other changes (excluding merge commits)
          OTHER=$(git log "$COMMIT_RANGE" --pretty=format:"- %s (%h)" --grep="^feat\|^fix\|^docs" --invert-grep --no-merges 2>/dev/null || true)
          if [ -n "$OTHER" ]; then
            CHANGELOG="$CHANGELOG

### 🔧 Other Changes
$OTHER"
          fi
          
          # Add Docker image info
          CHANGELOG="$CHANGELOG

### 🐳 Docker Image
\`\`\`
docker pull ghcr.io/${{ github.repository }}:${CURRENT_TAG}
\`\`\`"
          
          # Add full changelog link
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG="$CHANGELOG

**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}"
          fi
          
          # Output the changelog
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create source archive
        run: |
          # Create source zip excluding unnecessary files
          git archive --format=zip --prefix=citadel-${GITHUB_REF_NAME}/ \
            --output=citadel-${GITHUB_REF_NAME}-source.zip \
            HEAD
          echo "Created source archive: citadel-${GITHUB_REF_NAME}-source.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            citadel-${{ github.ref_name }}-source.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Summary
  release-summary:
    runs-on: ubuntu-latest
    needs: [verify-version, smoke-test, build-and-push-image, create-release]
    if: always()
    steps:
      - name: Release Summary
        run: |
          echo "## Release Summary for ${{ github.ref_name }}"
          echo ""
          echo "| Job | Status |"
          echo "|-----|--------|"
          echo "| Verify Version | ${{ needs.verify-version.result }} |"
          echo "| Smoke Test | ${{ needs.smoke-test.result }} |"
          echo "| Build & Push Image | ${{ needs.build-and-push-image.result }} |"
          echo "| Create Release | ${{ needs.create-release.result }} |"
          echo ""
          echo "### Docker Image"
          echo "\`\`\`"
          echo "docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
          echo "\`\`\`"

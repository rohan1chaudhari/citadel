name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION from tag: $TAG"

      - name: Validate package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "❌ Version mismatch: package.json is $PKG_VERSION, tag is ${{ steps.version.outputs.version }}"
            exit 1
          fi
          echo "✅ Package.json version ($PKG_VERSION) matches tag"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages (smoke test)
        run: |
          cd core && npm run build && cd ..
          cd host && npm run build && cd ..
          echo "✅ Build passed"

      - name: Run tests
        run: cd host && npm test

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ steps.version.outputs.tag }}^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, using all commits"
            COMMIT_RANGE=""
          else
            echo "Previous tag: $PREV_TAG"
            COMMIT_RANGE="${PREV_TAG}..${{ steps.version.outputs.tag }}"
          fi
          
          # Generate changelog from conventional commits
          {
            echo "CHANGELOG<<EOF"
            echo "## What's Changed"
            echo ""
            
            # Features
            if [ -z "$COMMIT_RANGE" ]; then
              FEATURES=$(git log --pretty=format:"%s" | grep -E "^feat(\(.+\))?:" || true)
            else
              FEATURES=$(git log $COMMIT_RANGE --pretty=format:"%s" | grep -E "^feat(\(.+\))?:" || true)
            fi
            if [ -n "$FEATURES" ]; then
              echo "### ✨ Features"
              echo "$FEATURES" | sed 's/^feat(\([^)]*\))\?:/* **\1:** /; s/^feat\!*:/\* /'
              echo ""
            fi
            
            # Fixes
            if [ -z "$COMMIT_RANGE" ]; then
              FIXES=$(git log --pretty=format:"%s" | grep -E "^fix(\(.+\))?:" || true)
            else
              FIXES=$(git log $COMMIT_RANGE --pretty=format:"%s" | grep -E "^fix(\(.+\))?:" || true)
            fi
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo "$FIXES" | sed 's/^fix(\([^)]*\))\?:/* **\1:** /; s/^fix\!*:/\* /'
              echo ""
            fi
            
            # Documentation
            if [ -z "$COMMIT_RANGE" ]; then
              DOCS=$(git log --pretty=format:"%s" | grep -E "^docs(\(.+\))?:" || true)
            else
              DOCS=$(git log $COMMIT_RANGE --pretty=format:"%s" | grep -E "^docs(\(.+\))?:" || true)
            fi
            if [ -n "$DOCS" ]; then
              echo "### 📚 Documentation"
              echo "$DOCS" | sed 's/^docs(\([^)]*\))\?:/* **\1:** /; s/^docs\!*:/\* /'
              echo ""
            fi
            
            # Other changes
            if [ -z "$COMMIT_RANGE" ]; then
              OTHERS=$(git log --pretty=format:"%s" | grep -vE "^(feat|fix|docs|chore|autopilot)(\(.+\))?:" | grep -vE "^Merge" | head -20 || true)
            else
              OTHERS=$(git log $COMMIT_RANGE --pretty=format:"%s" | grep -vE "^(feat|fix|docs|chore|autopilot)(\(.+\))?:" | grep -vE "^Merge" | head -20 || true)
            fi
            if [ -n "$OTHERS" ]; then
              echo "### 📝 Other Changes"
              echo "$OTHERS" | sed 's/^/* /'
              echo ""
            fi
            
            echo "---"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-${{ steps.version.outputs.tag }}~1}...${{ steps.version.outputs.tag }}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.tag }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Create source archive
        run: |
          tar czf "citadel-${{ steps.version.outputs.tag }}.tar.gz" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='*/node_modules' \
            --exclude='.next' \
            --exclude='*/.next' \
            --exclude='*.tar.gz' \
            .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          files: |
            citadel-${{ steps.version.outputs.tag }}.tar.gz
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output release summary
        run: |
          echo "✅ Release ${{ steps.version.outputs.tag }} created successfully!"
          echo "📦 Docker image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}"
          echo "📝 Changelog generated from conventional commits"
